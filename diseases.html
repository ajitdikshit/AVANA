            to { transform: translateY(0); opacity: 1; }

        // --- UI LOGIC ---
        const grid = document.getElementById('diseaseGrid');
        const searchInput = document.getElementById('searchInput');
        const filterPills = document.querySelectorAll('.filter-pill');
        const noResults = document.getElementById('no-results');
        const modal = document.getElementById('diseaseModal');
        const modalBody = document.getElementById('modalBody');
        const closeModal = document.getElementById('closeModal');

        let currentFilter = 'all';
        let searchQuery = '';

        function renderCards() {
            grid.innerHTML = '';
            
            const filteredData = diseaseDatabase.filter(disease => {
                const matchesSearch = disease.name.toLowerCase().includes(searchQuery) || disease.symptoms.toLowerCase().includes(searchQuery);
                const matchesFilter = currentFilter === 'all' || disease.type === currentFilter || (currentFilter === 'bacterial' && disease.type === 'bacterial');
                return matchesSearch && matchesFilter;
            });

            if (filteredData.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                filteredData.forEach(disease => {
                    const card = document.createElement('div');
                    card.className = 'disease-card';
                    card.onclick = () => openModal(disease);
                    
                    card.innerHTML = `
                        <div class="card-header" style="background: linear-gradient(to right, ${disease.color}33, white);">
                            <div class="icon-circle" style="background-color: ${disease.color}">${disease.icon}</div>
                            <div class="card-title-area">
                                <div class="card-title">${disease.name}</div>
                                <div class="card-type">${disease.type}</div>
                            </div>
                        </div>
                        <div class="card-body">
                            <strong>Symptoms:</strong>
                            <div class="symptom-preview">${disease.symptoms}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // Search & Filter Listeners
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderCards();
        });

        filterPills.forEach(pill => {
            pill.addEventListener('click', () => {
                filterPills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                currentFilter = pill.dataset.filter;
                renderCards();
            });
        });

        // Modal Logic
        function openModal(disease) {
            let treatmentList = disease.treatment.map(item => `<li>${item}</li>`).join('');

            modalBody.innerHTML = `
                <div class="modal-header">
                    <div class="icon-circle" style="background-color: ${disease.color}; width: 60px; height: 60px; font-size: 30px;">${disease.icon}</div>
                    <div>
                        <div class="modal-title">${disease.name}</div>
                        <div style="color: #718096; text-transform: uppercase; font-size: 12px; font-weight: bold; letter-spacing: 1px;">${disease.type} ISSUE</div>
                    </div>
                </div>
                
                <div class="warning-box">
                    <div class="warning-title">🔍 How to identify it</div>
                    <p style="font-size: 14px; color: #4a5568;">${disease.symptoms}</p>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <strong style="color: #2d3748;">What causes this?</strong>
                    <p style="font-size: 14px; color: #4a5568; margin-top: 5px;">${disease.causes}</p>
                </div>

                <div class="treatment-box">
                    <div class="treatment-title">🩺 Treatment Plan</div>
                    <ul class="info-list">
                        ${treatmentList}
                    </ul>
                </div>
                
                <div>
                    <strong style="color: #2d3748;">🛡️ Prevention</strong>
                    <p style="font-size: 14px; color: #4a5568; margin-top: 5px;">${disease.prevention}</p>
                </div>
            `;
            modal.style.display = 'flex';
        }

        closeModal.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; }

        // Initial Render
        renderCards();
    </script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered successfully with scope: ', registration.scope);
                    }, err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
