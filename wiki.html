        .sidebar-title {

            font-weight: bold; border-bottom: 1px solid #2b4c44; margin-bottom: 10px;
        }

        .main-content {

        }

        .header {
            display: flex; align-items: center; margin-bottom: 20px;

            top: 15px; z-index: 100;

        }
        .header h1 { color: #1e3932; font-size: 22px; }

        .search-container { margin-bottom: 15px; }

            transition: border-color 0.3s;
        }
        .search-input:focus { outline: none; border-color: #48bb78; }

        .filter-scroll {
            display: flex; overflow-x: auto; gap: 10px; padding-bottom: 10px;
            margin-bottom: 15px; scrollbar-width: none; /* Hide scrollbar Firefox */
        }
        .filter-scroll::-webkit-scrollbar { display: none; /* Hide scrollbar Chrome/Safari */ }
        
        .filter-pill {
            background-color: white; border: 1px solid #cbd5e0; color: #4a5568;
            padding: 8px 16px; border-radius: 20px; font-size: 14px;
            white-space: nowrap; cursor: pointer; transition: 0.2s; font-weight: bold;

        .filter-pill.active { background-color: #48bb78; color: white; border-color: #48bb78; }

        /* --- Wiki Grid --- */
        .wiki-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }
        @media(min-width: 768px) {
            .wiki-grid { grid-template-columns: repeat(3, 1fr); gap: 20px; }
        }
        @media(max-width: 400px) {
            .wiki-grid { grid-template-columns: 1fr; } /* Stack on very tiny phones */
        }

        .wiki-card {
            background-color: white; border-radius: 12px; overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); cursor: pointer;

        .badge { font-size: 12px; padding: 4px 8px; border-radius: 4px; background: #edf2f7; color: #4a5568; }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;

/* --- AVANA Loading Screen --- */

            font-size: 16px;

            font-style: italic;

        // --- UI LOGIC ---
        const grid = document.getElementById('wikiGrid');
        const searchInput = document.getElementById('searchInput');
        const filterPills = document.querySelectorAll('.filter-pill');
        const noResults = document.getElementById('no-results');
        const modal = document.getElementById('plantModal');
        const modalBody = document.getElementById('modalBody');
        const closeModal = document.getElementById('closeModal');

        let currentFilter = 'all';
        let searchQuery = '';

        // Render Cards
        function renderCards() {
            grid.innerHTML = '';
            
            const filteredPlants = plantDatabase.filter(plant => {
                const matchesSearch = plant.name.toLowerCase().includes(searchQuery) || plant.species.toLowerCase().includes(searchQuery);
                const matchesFilter = currentFilter === 'all' || plant.tags.includes(currentFilter);
                return matchesSearch && matchesFilter;
            });

            if (filteredPlants.length === 0) {
                noResults.style.display = 'block';
            } else {
                noResults.style.display = 'none';
                filteredPlants.forEach(plant => {
                    const card = document.createElement('div');
                    card.className = 'wiki-card';
                    card.onclick = () => openModal(plant);
                    
                    let tagsHtml = '';
                    if (plant.tags.includes('beginner')) tagsHtml += '<span class="badge">🔰 Easy</span>';
                    if (plant.tags.includes('low-light')) tagsHtml += '<span class="badge">🌑 Low Light</span>';
                    if (plant.tags.includes('pet-safe')) tagsHtml += '<span class="badge">🐾 Safe</span>';

                    card.innerHTML = `
                        <div class="card-img" style="background-color: ${plant.color}">${plant.icon}</div>
                        <div class="card-content">
                            <div class="card-title">${plant.name}</div>
                            <div class="card-species">${plant.species}</div>
                            <div class="card-badges">${tagsHtml}</div>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        // Search Listener
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value.toLowerCase();
            renderCards();
        });

        // Filter Listener
        filterPills.forEach(pill => {
            pill.addEventListener('click', () => {
                // Update active class
                filterPills.forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                
                currentFilter = pill.dataset.filter;
                renderCards();
            });
        });

        // Modal Logic
        function openModal(plant) {
            const toxicBox = plant.toxic 
                ? `<div class="info-section warning-box">
                    <div class="info-title warning-title">⚠️ Toxicity Warning</div>
                    <div class="info-text">${plant.toxicityInfo}</div>
                   </div>`
                : `<div class="info-section" style="background:#f0fdf4; border:1px solid #c6f6d5;">
                    <div class="info-title" style="color:#276749;">🐾 Pet Safe</div>
                    <div class="info-text">${plant.toxicityInfo}</div>
                   </div>`;

            modalBody.innerHTML = `
                <div class="modal-header-icon">${plant.icon}</div>
                <div class="modal-title">${plant.name}</div>
                <div class="modal-species">${plant.species}</div>
                
                <div class="info-section">
                    <div class="info-title">☀️ Light Requirements</div>
                    <div class="info-text">${plant.light}</div>
                </div>
                
                <div class="info-section">
                    <div class="info-title">💧 Watering Schedule</div>
                    <div class="info-text">${plant.water}</div>
                </div>
                
                ${toxicBox}

                <button class="add-garden-btn" id="addToGardenBtn">➕ Add to My Garden</button>
            `;
            
            modal.style.display = 'flex';

            // Attach Firebase logic to the new button inside the modal
            document.getElementById('addToGardenBtn').onclick = () => saveToGardenDB(plant);
        }

        // Close Modal Handlers
        closeModal.onclick = () => modal.style.display = 'none';
        window.onclick = (e) => { if (e.target === modal) modal.style.display = 'none'; }

        // --- FIREBASE: Add to 'My Garden' ---
        async function saveToGardenDB(plant) {
            const btn = document.getElementById('addToGardenBtn');
            btn.innerText = "Adding...";
            btn.disabled = true;

            const gardenRef = ref(db, 'my_garden');
            
            try {
                await set(push(gardenRef), {
                    name: plant.name,
                    species: plant.species,
                    waterFrequencyDays: plant.waterFreq,
                    lastWatered: Date.now()
                });
                
                btn.innerText = "✅ Added successfully!";
                btn.style.backgroundColor = "#2f855a";
                
                setTimeout(() => { modal.style.display = 'none'; }, 1500);
            } catch (error) {
                console.error("Error adding to garden:", error);
                alert("Failed to add to garden.");
                btn.innerText = "➕ Add to My Garden";
                btn.disabled = false;
            }
        }

        // Initial Render
        renderCards();

                    }, err => {
